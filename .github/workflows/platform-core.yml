name: Platform Core

on:
  push:
    branches:
      - feature/platform-core-7.0
  pull_request:
    paths:
      - 'backend/**'
      - 'compose.platform.yml'
      - '.github/workflows/platform-core.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        working-directory: backend
        run: python -m pip install -e '.[test]'
      - name: Test
        working-directory: backend
        run: pytest -q
      - name: Build container
        run: docker compose -f compose.platform.yml build platform-core
