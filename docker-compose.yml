services:
  auditor:
    build: .
    container_name: ai-bit-auditor
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  browser-worker:
    build:
      context: ./browser-worker
    container_name: ai-bit-browser-worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8090:8090"
    volumes:
      - ./reports/ui:/app/artifacts
      - ./data/browser-state:/app/state
      - ./bin:/app/bin:ro
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
